<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class = "background">
    <div class="form-container">
    <h2>Plagiarism Detector</h2>
    <form action="/check" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Upload a file to check for plagiarism </label>
            <input type="file" name="file1" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Upload another file to compare </label>
            <input type="file" name="file2" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Compare Files</button>
    </form>
</div>
</body>
</html>
